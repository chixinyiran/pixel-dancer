<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">

<title>MOONWALKER · 黑白像素 MJ</title>
<style>
  :root{color-scheme:dark}
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    background:radial-gradient(ellipse at 50% 30%, #111 0%, #000 70%);
    color:#ddd;
    font-family:"Courier New",Courier,ui-monospace,monospace;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:11px;overflow:hidden;-webkit-user-select:none;user-select:none;
    padding:12px;
  }
  h1{
    font-size:clamp(18px,3.4vw,30px);letter-spacing:.55em;text-indent:.55em;
    font-weight:700;color:#fff;
    animation:glow 2.4s ease-in-out infinite alternate;
  }
  @keyframes glow{from{text-shadow:0 0 6px rgba(255,255,255,.4)}to{text-shadow:0 0 14px rgba(255,255,255,.8),0 0 40px rgba(255,255,255,.3)}}
  .sub{font-size:12px;letter-spacing:.34em;color:#888;text-indent:.34em}

  .stage{position:relative;line-height:0}
  canvas{
    width:min(92vw,1040px);height:auto;
    image-rendering:-moz-crisp-edges;
    image-rendering:-webkit-optimize-contrast;
    image-rendering:crisp-edges;
    image-rendering:pixelated;
    background:#000;cursor:pointer;
    border:2px solid #2c2c2c;
    box-shadow:0 0 0 1px #000,0 14px 60px rgba(0,0,0,.9),0 0 70px rgba(255,255,255,.07);
  }
  .stage::after{
    content:"";position:absolute;inset:2px;pointer-events:none;
    background:
      repeating-linear-gradient(0deg, rgba(0,0,0,.22) 0 1px, transparent 1px 3px),
      radial-gradient(ellipse at center, transparent 58%, rgba(0,0,0,.5) 100%);
  }

  /* 控制台：与画布同宽对齐，整体一个视觉单元 */
  .console{
    width:min(92vw,1040px);box-sizing:border-box;
    display:flex;flex-direction:column;gap:10px;
    border:2px solid #2c2c2c;background:#050505;padding:11px 12px;
    box-shadow:0 0 0 1px #000;
  }
  .panel{display:flex;gap:9px;align-items:stretch}
  .trk{
    font-family:inherit;font-size:12px;letter-spacing:.1em;
    background:#000;color:#aaa;border:2px solid #444;
    padding:8px 11px;cursor:pointer;text-align:left;
    flex:1 1 0;min-width:0;
    transition:border-color .15s ease,color .15s ease,background .15s ease;
  }
  .trk small{
    display:block;color:#666;font-size:10px;margin-top:3px;letter-spacing:.04em;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  .trk:hover{border-color:#999;color:#fff}
  .trk.on{background:transparent;color:#fff;border-color:#fff;font-weight:700}
  .trk.on small{color:#bbb;font-weight:400}
  .btn{
    font-family:inherit;font-size:15px;
    background:#000;color:#fff;border:2px solid #777;
    flex:0 0 52px;cursor:pointer;transition:all .15s ease;
  }
  /* 播放按钮 hover: 只高亮边框,不要白底(原白底在触屏点击后会粘住,看着像选中). 仅鼠标设备生效 */
  @media (hover:hover){ .btn:hover{border-color:#fff;color:#fff} }
  .btn:active{border-color:#fff;color:#fff}
  .btn:focus{outline:none}
  .vol{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;color:#666;font-size:10px;flex:0 0 auto}
  input[type=range]{width:84px;accent-color:#fff;cursor:pointer}
  .row2{display:flex;flex-wrap:wrap;gap:10px;align-items:center;justify-content:space-between;font-size:11px;color:#666}
  .grp{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .file{
    border:2px dashed #444;padding:6px 12px;cursor:pointer;color:#888;
    letter-spacing:.1em;transition:all .15s ease;max-width:300px;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  }
  .file:hover{border-color:#999;color:#fff}
  .file.loaded{border-style:solid;border-color:#fff;color:#fff}
  .xbtn{background:#000;color:#888;border:1px solid #555;cursor:pointer;font-family:inherit;padding:4px 8px}
  .xbtn:hover{color:#fff;border-color:#fff}
  .hint{
    font-size:10px;color:#4a4a4a;letter-spacing:.16em;text-align:center;line-height:1.8;
    white-space:nowrap;max-width:none;       /* 永不折行 */
  }
  button,canvas,input{-webkit-tap-highlight-color:transparent;touch-action:manipulation}
  @media (max-width:680px){
    .panel{flex-wrap:wrap}
    .trk{flex:1 1 42%;padding:7px 9px;font-size:11px}
    .btn{flex:1 1 100%;height:40px}
    .vol{flex:1 1 100%;flex-direction:row}
    .row2{justify-content:center}
    .hint{
      font-size:10px;letter-spacing:.04em;
      white-space:normal;          /* 手机上允许折行 */
      max-width:92vw;line-height:1.9;
    }
    .hint .kbd{display:none}       /* 触屏没有键盘，隐藏快捷键说明 */
    body{gap:9px;padding:8px}
  }
  @media (prefers-reduced-motion:reduce){
    h1{animation:none}
    .trk,.btn,.card{transition:none}
  }
</style>

      g.gain.linearRampToValueAtTime(vol, t+.18);
      g.gain.setValueAtTime(vol, Math.max(t+.2, t+dur-.25));
      g.gain.linearRampToValueAtTime(.0001, t+dur+.05);
      o.connect(g); g.connect(padBus);

/* 标志性感叹腔（合成拟声，非采样）：hee=两声快速上滑 / ow=长下滑 / uh=低短促 */
function vVox(t, kind){
  function blip(t0, f1, f2, dur, amp){
    var o = ctx.createOscillator(), f = ctx.createBiquadFilter(), g = ctx.createGain();
    o.type = "square";
    o.frequency.setValueAtTime(f1, t0);
    o.frequency.exponentialRampToValueAtTime(f2, t0+dur*.7);
    f.type = "bandpass"; f.frequency.value = 1250; f.Q.value = 2.2;  // 元音共振腔
    g.gain.setValueAtTime(.0001, t0);
    g.gain.linearRampToValueAtTime(amp, t0+.015);
    g.gain.exponentialRampToValueAtTime(.001, t0+dur);
    o.connect(f); f.connect(g); g.connect(master); g.connect(dly);
    o.start(t0); o.stop(t0+dur+.02);
  }
  if (kind === "hee"){ blip(t, 620, 990, .09, .16); blip(t+.11, 660, 1050, .10, .15); }
  else if (kind === "ow"){ blip(t, 950, 420, .26, .17); }
  else { blip(t, 340, 250, .09, .15); }
}
/* 阴风（恐怖片氛围）：带通噪声扫频 */
function vHowl(t){
  var s = ctx.createBufferSource(), f = ctx.createBiquadFilter(), g = ctx.createGain();
  s.buffer = noiseBuf; s.loop = true;
  f.type = "bandpass"; f.Q.value = 9;
  f.frequency.setValueAtTime(280, t);
  f.frequency.linearRampToValueAtTime(1300, t+.9);
  f.frequency.linearRampToValueAtTime(450, t+1.7);
  g.gain.setValueAtTime(.0001, t);
  g.gain.linearRampToValueAtTime(.10, t+.5);
  g.gain.linearRampToValueAtTime(.0001, t+1.8);
  s.connect(f); f.connect(g); g.connect(master);
  s.start(t); s.stop(t+1.9);
}
function scheduler(){
  if (!ctx || !playing || userAudio) return;
  var song = SONGS[curTrack];
  var spb = 60 / song.bpm / 2;           // 8 分音符步长（与上传文件一致）
  // 预排窗口：前台 0.18s 足够；后台标签页 setInterval 被节流到 ~1s，
  // 必须把窗口放大到 1.5s 多预排音符，否则合成器在后台会断断续续。
  var lookahead = document.hidden ? 1.5 : .18;
  while (songStart + schedStep * spb < ctx.currentTime + lookahead){
    var t = songStart + schedStep * spb;
    var s = schedStep % 16;
    var bar = (schedStep / 16) | 0;
    if (t >= ctx.currentTime - .02){
      var bf = nfreq(song.bass[s]);
      if (bf) vBass(t, bf, spb*1.7);
      var lf = nfreq(song.lead[s]);
      if (lf) vLead(t, lf, spb*1.4, song.leadType);
      var dc = song.drum[s];
      if (dc === "K") vKick(t);
      else if (dc === "S"){ vKick(t); vSnare(t); }
      else if (dc === "h") vHat(t, false);
      else if (dc === "H") vHat(t, true);
      if (s % 8 === 0 && song.chord){
        var ci = ((schedStep/8)|0) % song.chord.length;
        chordPad(song.chord[ci], t, spb*8, .05);
      }
      if (song.vox)
        for (var j3=0;j3<song.vox.length;j3++)
          if (song.vox[j3].s === s && bar % 2 === (song.vox[j3].b || 0)) vVox(t, song.vox[j3].k);
      if (song.howl !== undefined && s === song.howl && bar % 4 === 0) vHowl(t);
    }
    schedStep++;
  }
}

/* ============ 时间轴求值 ============ */
var pose = {};
for (var pj=0; pj<JOINTS.length; pj++) pose[JOINTS[pj]] = [0,0];
function lerp(a,b,u){ return a + (b-a)*u; }
var evalOut = { x:0, sx:1 };
function evalRoutine(beats){
  var r = ROUTINES[curTrack], K = r.keys;
  var t = beats % r.len;
  var i = 0;
  while (i < K.length-2 && t >= K[i+1][0]) i++;
  var a = K[i], b = K[i+1];
  var u = (t - a[0]) / (b[0] - a[0]);
  if (u < 0) u = 0; if (u > 1) u = 1;
  var e = u*u*(3-2*u);
  var pa = P[a[1]], pb = P[b[1]];
  for (var j=0;j<JOINTS.length;j++){
    var n = JOINTS[j];
    pose[n][0] = lerp(pa[n][0], pb[n][0], e);
    pose[n][1] = lerp(pa[n][1], pb[n][1], e);
  }
  evalOut.x = lerp(a[2], b[2], u) * 1.25;  // 舞谱坐标 128 ⇔ 画布中线 160，整体居中
  evalOut.sx = lerp(a[3], b[3], e);
  return evalOut;
}

/* ============ 静态背景：星空 + 月亮 + 地砖网格（每次换分辨率时预渲染一次） ============ */
var BG = document.createElement("canvas");
var TWINKLE = [];   /* [FEAT] 闪烁星数据数组 */
function buildBG(){
  BG.width = Math.round(W*RES); BG.height = Math.round(H*RES);
  var b = BG.getContext("2d");
  b.setTransform(RES,0,0,RES,0,0);
  b.fillStyle = "#000"; b.fillRect(0,0,W,H);
  var s = 7;
  function rnd(){ s = (s*16807) % 2147483647; return s/2147483647; }
  /* [FEAT] 静态星星 75 颗 + 闪烁星 20 颗(存入 TWINKLE 数组,frame() 动态画) */
  for (var i=0;i<75;i++){
    b.fillStyle = rnd() < .22 ? "#fff" : (rnd()<.5 ? "#a8a8a8" : "#585858");
    b.fillRect((rnd()*W)|0, (rnd()*118)|0, 1, 1);
  }
  /* [STRONG] 生成 32 颗闪烁星(原20): 加大幅度/加快频率, 眨眼更明显 */
  TWINKLE = [];
  for (var ti=0; ti<32; ti++){
    TWINKLE.push({
      x: (rnd()*W)|0,
      y: (rnd()*112)|0,
      base: rnd() < .45 ? 0.95 : 0.5,       // 亮度基础(降低暗星基础→对比更大→眨得更明显)
      amp: 0.55 + rnd()*0.75,               // [STRONG] 闪烁幅度 0.55~1.3(原0.35~0.9), 摆动更大
      speed: 1.2 + rnd()*3.8,               // [STRONG] 频率 1.2~5.0(原0.6~3.0), 眨得更快
      phase: rnd() * 6.2832,                // 起始相位
      bigChance: rnd()                      // 用来判断是否偶尔放大成 2x2(亮的星)
    });
  }
  b.fillStyle = "#a8a8a8";
  b.beginPath(); b.arc(278, 30, 11, 0, 6.2832); b.fill();
  b.fillStyle = "#000";
  b.beginPath(); b.arc(273, 26, 10, 0, 6.2832); b.fill();
  b.fillStyle = "#6a6a6a";
  b.fillRect(0, G, W, 1);
  for (var x=0; x<=W; x+=TILE) b.fillRect(x, G, 1, H-G);
  b.fillStyle = "#3a3a3a";
  b.fillRect(0, H-1, W, 1);
}
function setRes(r){
  RES = r;
  C.width = Math.round(W*RES); C.height = Math.round(H*RES);
  buildBG();
}
setRes(RES);

/* ============ 发光地砖 ============ */
var NT = Math.ceil(W/TILE);
var tiles = new Float32Array(NT);
function lightTile(wx, v){

/* ============ 人物绘制：锥形肢体 + 西装剪裁 + 侧脸五官 ============ */

/* 锥形肢体：两端不同粗细的四边形 + 圆端帽，立刻摆脱火柴人感 */
function limb(a, b, w1, w2, col){
  var dx=b[0]-a[0], dy=b[1]-a[1], L=Math.sqrt(dx*dx+dy*dy)||1;
  var nx=-dy/L, ny=dx/L;
  X.fillStyle = col;
  X.beginPath();
  X.moveTo(a[0]+nx*w1, a[1]+ny*w1);
  X.lineTo(b[0]+nx*w2, b[1]+ny*w2);
  X.lineTo(b[0]-nx*w2, b[1]-ny*w2);
  X.lineTo(a[0]-nx*w1, a[1]-ny*w1);
  X.closePath(); X.fill();
  X.beginPath(); X.arc(a[0],a[1],w1,0,6.2832); X.fill();
  X.beginPath(); X.arc(b[0],b[1],w2,0,6.2832); X.fill();
}
function mid(a,b,u){ return [a[0]+(b[0]-a[0])*u, a[1]+(b[1]-a[1])*u]; }

/* 每首歌对应的标志性戏服（灰阶映射） */

 {jac:LT, pant:DK, hatc:DK,  band:WHT, shoe:DK},   // Beat It：浅色夹克 + 深裤
 {jac:LT, pant:LT, hatc:WHT, band:DK,  shoe:LT},   // Smooth Criminal：白西装白帽白鞋罩
 {jac:DK, pant:DK, hatc:DK,  band:LT,  shoe:DK}    // Thriller：暗色夜行装
];

/* 尖头乐福鞋：楔形鞋身 + 鞋跟 + 鞋面高光 */
function shoe(f, t, col){
  limb(f, t, 1.6, .8, col);
  var dx=t[0]-f[0], dy=t[1]-f[1], L=Math.sqrt(dx*dx+dy*dy)||1;
  X.fillStyle = col;
  X.fillRect(f[0]-dx/L*2.6-1, f[1]-1.0, 2.4, 2.8);   // 鞋跟
  X.strokeStyle = col === LT ? DK : LT;              // 鞋面高光/缝线
  X.lineWidth = .7;
  X.beginPath();
  X.moveTo(f[0]-dx/L*1.6, f[1]-1.6);

}

function drawLeg(hipP, k, f, t, pantCol, sockCol, rim, shoeCol){
  var sockTop = mid(f, k, .30);
  limb(hipP, k, 2.4, 1.6, pantCol);        // 大腿——比之前更收窄的锥形
  limb(k, sockTop, 1.6, 1.0, pantCol);     // 小腿，裤脚高吊

  X.fillRect(hc[0]+1.8, hc[1]-2.4, 2.0, .7);     // 浓眉
  X.fillRect(hc[0]+2.3, hc[1]-1.2, 1.3, 1.1);    // 眼
  X.fillRect(hc[0]+3.5, hc[1]+2.0, 1.2, .5);     // 唇线
  X.fillStyle = DK;
  X.fillRect(hc[0]+4.1, hc[1]+ .6, .9, .6);      // 鼻孔阴影
  X.fillRect(hc[0]+ .6, hc[1]+4.2, 1.8, .6);     // 下颌阴影
  X.fillRect(hc[0]-2.4, hc[1]-1.5, .9, 2.2);     // 鬓角
  /* 额前标志性碎卷 */
  X.beginPath(); X.arc(hc[0]+2.5, hc[1]-3.4, 1.1, 0, 6.2832); X.fill();
  X.beginPath(); X.arc(hc[0]+1.8, hc[1]-3.0, .9, 0, 6.2832); X.fill();
  X.beginPath(); X.arc(hc[0]+3.1, hc[1]-2.0, .8, 0, 6.2832); X.fill();

  /* —— 黑色软呢帽：压低盖眉 + 捏顶帽冠 + 前低后翘宽檐 + 白帽带 —— */
  var ang = Math.atan2(hc[0]-p.neck[0], -(hc[1]-p.neck[1]));
  X.save();
  X.translate(hc[0], hc[1]);
  X.rotate(ang*.7);
  X.fillStyle = co.hatc;
  X.beginPath();                                  // 帽冠
  X.moveTo(-4.4,-2.8); X.lineTo(-3.4,-9.6); X.lineTo(2.6,-9.6); X.lineTo(4.4,-2.8);
  X.closePath(); X.fill();
  X.fillStyle = co.hatc === WHT ? DK : BLK;
  X.fillRect(-.7,-9.2, 1.2, 2.2);                 // 捏痕
  X.fillStyle = co.hatc;
  X.beginPath();                                  // 宽帽檐，前缘压到眉眼
  X.moveTo(-8.8,-1.6);
  X.quadraticCurveTo(0,-4.6, 8.8,-2.2);
  X.lineTo(8.6,-.8);
  X.quadraticCurveTo(0,-2.8, -8.4, 0);
  X.closePath(); X.fill();
  X.fillStyle = co.band;
  X.fillRect(-4.2,-4.6, 8.6, 1.5);                // 帽带
  X.restore();

  X.restore();
}

/* ============ 播放控制 ============ */
var playBtn = document.getElementById("play");
var volEl = document.getElementById("vol");
var trkBtns = document.querySelectorAll(".trk");
var fileEl = document.getElementById("file");
var fileLab = document.getElementById("fileLab");
var offEl = document.getElementById("off");
var offWrap = document.getElementById("offWrap");
var clearBtn = document.getElementById("clear");

function startClock(){
  if (ctx){
    if (ctx.state === "suspended") ctx.resume();
    songStart = ctx.currentTime + .08;
    schedStep = 0;
  }
  fallbackT0 = performance.now();
}
function setPlaying(v){
  playing = v;
  playBtn.textContent = v ? "❚❚" : "▶";
  if (userAudio){
    if (v) userAudio.play(); else userAudio.pause();
    return;
  }
  if (v){
    initAudio();
    /* [FIX] 强制等待 ctx.resume() 完成再播放，否则 Chrome autoplay 策略下 ctx 仍是 suspended → 音频静音 */
    var afterResume = function(){
      startLoop();
      _updateMediaSession();
      if (useTagAudio){
        /* [BG-REWRITE] 主路径: <audio> 标签播放(后台可靠) */
        if (mainAudio && mainAudio.src && mainAudio.paused && mainAudio.currentTime > 0){
          var pr = mainAudio.play(); if(pr&&pr.catch)pr.catch(function(){});  /* 暂停后继续 */
        } else {
          _playSongViaTag(curTrack);  /* 从头播 */
        }
      } else if (realFailed){
        startClock(); if (!schedTimer) schedTimer = setInterval(scheduler, 70);
      } else if (!realSrc){
        playReal(curTrack, 0);
      }
    };
    if (ctx && ctx.state==='suspended'){
      var p = ctx.resume();
      if (p && p.then) p.then(afterResume); else afterResume();
    } else {
      afterResume();
    }
  } else {
    if (schedTimer){ clearInterval(schedTimer); schedTimer = 0; }
    _clearNextTimer();
    _stopTagAudio();     /* [BG-REWRITE] 暂停 <audio> 标签 */
    if ('mediaSession' in navigator){ try{ navigator.mediaSession.playbackState="paused"; }catch(e){} }
    /* 注: 不 suspend ctx, 合成器走 ctx; <audio> 独立于 ctx */
  }
}
playBtn.addEventListener("click", function(){ setPlaying(!playing); });
C.addEventListener("click", function(){ setPlaying(!playing); });
volEl.addEventListener("input", function(){
  if (master) master.gain.value = volEl.value / 100;
  if (userAudio) userAudio.volume = volEl.value / 100;
  if (mainAudio) mainAudio.volume = volEl.value / 100;   /* [BG-REWRITE] 同步 <audio> 音量 */
});
for (var ti=0; ti<trkBtns.length; ti++){
  trkBtns[ti].addEventListener("click", function(){
    var i = +this.getAttribute("data-i");
    if (i === curTrack){            // 再次点击当前曲目 → 暂停/继续
      setPlaying(!playing);
      return;
    }
    for (var k=0;k<trkBtns.length;k++) trkBtns[k].className = "trk";
    this.className = "trk on";
    curTrack = i;                   // 切歌：从头起拍
    if (useTagAudio){ _stopTagAudio(); }   /* [BG-REWRITE] 切歌停旧 <audio> */
    else if (!userAudio && !realFailed) stopReal();
    if (!playing) setPlaying(true);
    else if (userAudio) { /* 导入模式：单一音源 */ }
    else if (useTagAudio) _playSongViaTag(i);     /* [BG-REWRITE] <audio> 切到该曲 */
    else if (realFailed) startClock();
    else playReal(i, 0);
    _updateMediaSession();
  });
}
/* 本地原曲模式：导入后舞步按所选曲目 BPM 跟随音频时钟 */
fileEl.addEventListener("change", function(){
  var f = fileEl.files && fileEl.files[0];
  if (!f) return;
  if (schedTimer){ clearInterval(schedTimer); schedTimer = 0; }
  if (ctx) ctx.suspend();
  if (userURL) URL.revokeObjectURL(userURL);
  userURL = URL.createObjectURL(f);
  userAudio = new Audio(userURL);
  userAudio.loop = true;
  userAudio.volume = volEl.value / 100;
  fileLab.className = "file loaded";
  fileLab.firstChild.textContent = "♪ " + f.name + " ";
  offWrap.style.display = ""; clearBtn.style.display = "";
  setPlaying(true);
});
offEl.addEventListener("input", function(){ beatOffset = offEl.value / 100; });
clearBtn.addEventListener("click", function(){
  if (userAudio){ userAudio.pause(); userAudio = null; }
  if (userURL){ URL.revokeObjectURL(userURL); userURL = null; }
  fileEl.value = "";
  fileLab.className = "file";
  fileLab.firstChild.textContent = "♪ 导入本地原曲（用真歌高潮片段伴舞）";
  offWrap.style.display = "none"; clearBtn.style.display = "none";
  if (playing) setPlaying(true);
});
/* 像素细度切换 */
var resBtns = document.querySelectorAll(".resb");
for (var ri=0; ri<resBtns.length; ri++){
  resBtns[ri].addEventListener("click", function(){
    for (var k=0;k<resBtns.length;k++){
      resBtns[k].style.color = ""; resBtns[k].style.borderColor = "";
    }
    this.style.color = "#fff"; this.style.borderColor = "#fff";
    setRes(+this.getAttribute("data-r"));
  });
}
/* 切到后台（标签页不可见）时音乐继续播放，不暂停。
   - 真实歌曲(BufferSource)和导入音频(<audio>)由音频时钟驱动，后台天然继续放。
   - WebAudio 合成器走 setInterval(scheduler) 调度，后台会被浏览器节流到 ~1s 导致拍点卡顿，
     故主动把它的提前量调大，靠预排更多音符抗节流，尽量保持后台连续发声。
   - 浏览器若擅自 suspend 了 AudioContext，回前台时再 resume，避免静音。
   动画(requestAnimationFrame)在后台本就不触发，回前台由下方 startLoop 自动拉起。 */
document.addEventListener("visibilitychange", function(){
  /* [FEAT] 切后台保持播放: 不主动 suspend ctx, 只省 rAF;
     回前台 resume(防系统自动 suspend)+ 拉 rAF + 续播被系统暂停的 audio */
  if (document.hidden){
    /* 后台: 让浏览器自己节流 rAF, 不动音频. 不调 suspend, 让音频继续走 */
  } else {
    if (playing && ctx && ctx.state === "suspended"){ try { ctx.resume(); } catch(e){} }
    if (playing && userAudio && userAudio.paused){ try { userAudio.play(); } catch(e){} }
    startLoop();
  }
});
/* [FEAT] 多重保险: pageshow / focus 也尝试续播 */
window.addEventListener("pageshow", function(){
  if (playing && ctx && ctx.state === "suspended"){ try { ctx.resume(); } catch(e){} }
  if (playing && userAudio && userAudio.paused){ try { userAudio.play(); } catch(e){} }
  startLoop();
});
window.addEventListener("focus", function(){
  if (playing && ctx && ctx.state === "suspended"){ try { ctx.resume(); } catch(e){} }
});
/* 键盘快捷键：空格 播放/暂停，1-4 切歌 */
document.addEventListener("keydown", function(ev){
  if (ev.key === " " || ev.code === "Space"){
    ev.preventDefault();
    setPlaying(!playing);
  } else if (ev.key >= "1" && ev.key <= "4"){
    var btn = trkBtns[+ev.key - 1];
    if (btn) btn.click();
  }
});

/* ============ 主循环 ============ */
var frameCount = 0;
var rafPending = false;
function startLoop(){
  /* [FIX] 之前 hidden 时直接不启动 → 初始化时若浏览器报 hidden 会永远不画。
     改为：无论 hidden 与否都尝试启动 rAF；Chrome 在 hidden 时会自动节流为低频，frame() 内有 hidden 早退保护。 */
  if (!rafPending){
    rafPending = true;
    requestAnimationFrame(frame);
  }
}
function getBeats(){
  var bpm = SONGS[curTrack].bpm;
  if (userAudio && playing)
    return Math.max(0, (userAudio.currentTime + beatOffset)) * bpm / 60;
  if (useTagAudio && mainAudio && playing && !mainAudio.paused)   /* [BG-REWRITE] <audio> 按播放位置对拍 */
    return Math.max(0, mainAudio.currentTime) * bpm / 60;
  if (realSrc && playing && realDur){            // 真实歌曲：按音频播放位置取拍，保证舞步对拍
    var pos = (((ctx.currentTime - realStart) % realDur) + realDur) % realDur;
    return pos * bpm / 60;
  }
  if (ctx && playing){                            // 合成器回退
    var b = (ctx.currentTime - songStart) * bpm / 60;
    return b > 0 ? b : 0;
  }
  return (performance.now() - fallbackT0) / 1000 * bpm / 60;
}

function frame(){
  // 后台不可见时停止重绘并不再申请下一帧（省电、避免回前台跳帧）；
  // 回到前台由 visibilitychange 重新拉起循环。
  if (document.hidden){ rafPending = false; return; }
  requestAnimationFrame(frame);
  frameCount++;
  var beats = playing ? getBeats() : 0.0001;
  var o = evalRoutine(beats);
  var pulse = 1 - (beats % 1); pulse *= pulse;

  X.setTransform(1,0,0,1,0,0);
  X.drawImage(BG, 0, 0);
  X.setTransform(RES,0,0,RES,0,0);   // 之后全部按 320×180 逻辑坐标作画
  /* [FEAT] 闪烁星: 每帧用 sin 波动态画亮度,自然眨眼效果 */
  if (TWINKLE && TWINKLE.length){
    var tNow = (typeof performance!=='undefined' ? performance.now() : Date.now()) * 0.001;
    for (var ti=0; ti<TWINKLE.length; ti++){
      var s = TWINKLE[ti];
      var v = s.base + s.amp * Math.sin(tNow * s.speed + s.phase);   // 亮度
      v = Math.max(0, Math.min(1, v));
      // [STRONG] 极暗时完全熄灭(范围更大→明显的"睁眼闭眼"); 暗于0.18直接不画
      if (v < 0.18) continue;
      var alpha = (v*v).toFixed(3);   // [STRONG] 平方曲线: 亮处更亮暗处更暗, 对比强烈
      X.fillStyle = v > 0.7 ? "rgba(255,255,255,"+alpha+")" : (v > 0.4 ? "rgba(225,225,225,"+alpha+")" : "rgba(150,150,150,"+alpha+")");
      X.fillRect(s.x, s.y, 1, 1);
      // [STRONG] 亮星十字光芒: 阈值降到 0.8(原0.92)、概率放宽(原0.6→0.45), 更频繁出现
      if (v > 0.8 && s.bigChance > 0.45){
        X.fillStyle = "rgba(255,255,255,"+(alpha*0.7).toFixed(3)+")";
        X.fillRect(s.x-1, s.y, 1, 1);
        X.fillRect(s.x+1, s.y, 1, 1);
        X.fillRect(s.x, s.y-1, 1, 1);
        X.fillRect(s.x, s.y+1, 1, 1);
        // [STRONG] 峰值时再加对角微光, 像真的闪一下
        if (v > 0.95){
          X.fillStyle = "rgba(255,255,255,"+(alpha*0.4).toFixed(3)+")";
          X.fillRect(s.x-1, s.y-1, 1, 1); X.fillRect(s.x+1, s.y-1, 1, 1);
          X.fillRect(s.x-1, s.y+1, 1, 1); X.fillRect(s.x+1, s.y+1, 1, 1);
        }
      }
    }
  }

  /* 聚光灯光池，随节拍呼吸 */
  X.fillStyle = "rgba(255,255,255,.30)";
  ell(o.x, G+7, 26 + 6*pulse, 5);

  /* 地砖：四首曲目四种灯光语言 */
  if (curTrack === 0){                       // Billie Jean：踩哪亮哪
    lightTile(o.x + o.sx*SC*pose.lt[0], 1);
    lightTile(o.x + o.sx*SC*pose.rt[0], 1);
  } else if (curTrack === 1){                // Beat It：每拍整排脉冲
    if (beats % 1 < .1) for (var a1=0;a1<NT;a1++) lightTile(a1*TILE+2, .4);
    lightTile(o.x + o.sx*SC*pose.rt[0], 1);
  } else if (curTrack === 2){                // Smooth Criminal：扫光
    lightTile((((beats*2)|0) % NT) * TILE + 2, .85);
    lightTile(o.x + o.sx*SC*pose.rt[0], 1);
  } else {                                   // Thriller：隔砖频闪
    if (beats % 4 < .12) for (var a2=0;a2<NT;a2+=2) lightTile(a2*TILE+2, .55);
    lightTile(o.x + o.sx*SC*pose.rt[0], 1);
  }
  for (var i=0;i<NT;i++){
    var v = tiles[i];
    if (v > .03){
      X.fillStyle = "rgba(255,255,255," + (v*.9).toFixed(3) + ")";
      X.fillRect(i*TILE+1, G+1, TILE-1, H-G-2);
      tiles[i] = v * .9;
    }
  }

  drawFigure(o.x, o.sx, frameCount);
  drawMic();   // 话筒在人物之后绘制 → 人物经过时被遮挡（前景层）

  /* 四阶灰度量化（LUT + Uint32，无分支单次写入） */
  X.setTransform(1,0,0,1,0,0);
  var img = X.getImageData(0, 0, C.width, C.height);
  var d32 = new Uint32Array(img.data.buffer);
  if (IS_LE)
    for (var n=0;n<d32.length;n++) d32[n] = LUT[d32[n] & 255];
  else
    for (var n2=0;n2<d32.length;n2++) d32[n2] = LUT[(d32[n2]>>>24) & 255];
  X.putImageData(img, 0, 0);
}
startLoop();
/* [FIX] 兜底：若初始 startLoop 因 hidden 等原因没注册到 rAF，DOM 完整后再补一次 */
if (document.readyState === 'loading'){
  document.addEventListener('DOMContentLoaded', startLoop, {once:true});
}
window.addEventListener('load', startLoop, {once:true});
})();
</script>
